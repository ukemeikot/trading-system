name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Import-linter (clean architecture dependency rule)
        run: lint-imports

      - name: Mypy (strict on domain + application)
        run: mypy --strict src/tsys/domain src/tsys/application

      - name: Pytest
        run: pytest --cov=tsys --cov-report=term-missing
